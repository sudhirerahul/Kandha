services:
  - type: web
    name: kandha-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GMI_API_KEY
        sync: false
      - key: GMI_BASE_URL
        value: https://api.gmi.ai/v1
      - key: GMI_MODEL
        value: kimi-k2-5
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: '["http://localhost:3000","https://kandha.vercel.app"]'
      - key: DATABASE_URL
        fromDatabase:
          name: kandha-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          name: kandha-redis
          type: redis
          property: connectionURI
      - key: PYTHON_VERSION
        value: "3.11.11"

databases:
  - name: kandha-db
    plan: free
    databaseName: kandha
    user: kandha
