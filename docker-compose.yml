# Local development infrastructure for Kandha
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kandha
      POSTGRES_PASSWORD: kandha
      POSTGRES_DB: kandha
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kandha-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kandha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kandha-local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.14
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kandha.dev
      PGADMIN_DEFAULT_PASSWORD: kandha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kandha-local
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: kandha
      MINIO_ROOT_PASSWORD: kandha_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - kandha-local
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  kandha-local:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  minio_data:
